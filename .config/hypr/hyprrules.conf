# Games
windowrule = immediate on, match:class ^(Minecraft)
windowrule = immediate on, match:class ^(nfs13.exe)
windowrule = fullscreen on, match:class ^(tod.exe)

#MC laucher thingy
windowrule {
  name = MC_launcher
  float = on
  match:title = (Select Your Minecraft Launcher Location)
  size = (window_w*1.5) (window_h*1.5)
  center = on
}
